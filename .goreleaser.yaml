version: 2
project_name: res

before:
  hooks:
    - rm -rf dist res
    - go mod tidy

brews:
  - name: res
    repository:
      owner: profiprog
      name: homebrew-tap
    skip_upload: auto
    homepage: https://github.com/profiprog/res
    url_template: "https://github.com/profiprog/res/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    directory: Formula # This DID change from 'folder' to 'directory'
    caveats: "How to use this binary: https://github.com/profiprog/res"
    description: "Tool for filtering kubernetes resources defined in yaml"
    install: |
      bin.install "res"
    test: |
      system "#{bin}/res"

builds:
  - env:
      - CGO_ENABLED=0 # bez ceckovej podpory (vsetko je pure go, ziadne dependencie na systemove C kniznice)
    goos:
      - linux
      - windows
      - darwin
    ignore:
      - goos: windows
        goarch: arm64
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -X github.com/profiprog/res/version.Version=v{{.Version}}

snapshot:
  version_template: "{{ incminor .Version }}-dev"

archives:
  - formats: [ 'tar.gz' ]
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

# dockers_v2:
